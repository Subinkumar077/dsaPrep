<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DSA Prep — Interview Dashboard</title>
<meta name="description" content="Complete DSA Interview Prep — Blind75, NeetCode150, Striver A2Z, FAANG">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700;800&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════════════════════
   DSA PREP — NEOBRUTALIST REDESIGN
   Typography: Space Grotesk (display) + Inter (body) + JetBrains Mono (code)
   Signature: thick black borders + offset shadow boxes + electric yellow accent
   ══════════════════════════════════════════════════════════════ */

@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700;800&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;700&display=swap');

/* ── 1. Tokens ─────────────────────────────────────────────────── */
:root {
  --bg:         #0f0f0f;
  --bg-2:       #1a1a1a;
  --bg-3:       #242424;
  --bg-4:       #2e2e2e;
  --border:     #ffffff22;
  --border-hard:#ffffff44;
  --text:       #f0f0f0;
  --text-2:     #a0a0a0;
  --text-3:     #606060;

  /* Accent palette — bold, deliberate */
  --yellow:     #f5e642;
  --yellow-dim: #f5e64222;
  --green:      #22c55e;
  --green-dim:  #22c55e1a;
  --red:        #ef4444;
  --red-dim:    #ef44441a;
  --blue:       #3b82f6;
  --blue-dim:   #3b82f61a;
  --purple:     #a855f7;
  --purple-dim: #a855f71a;
  --orange:     #f97316;
  --orange-dim: #f973161a;
  --teal:       #14b8a6;
  --teal-dim:   #14b8a61a;

  /* Neobrutalism signature: thick offset shadow */
  --shadow-neo: 4px 4px 0px #ffffff18;
  --shadow-neo-sm: 3px 3px 0px #ffffff14;
  --shadow-hover: 6px 6px 0px #f5e64233;

  --sidebar-w:  256px;
  --header-h:   58px;
  --radius:     6px;
  --radius-lg:  10px;
  --trans:      0.15s ease;
  --font-display: 'Space Grotesk', sans-serif;
  --font-body:    'Inter', sans-serif;
  --font-mono:    'JetBrains Mono', monospace;
}

[data-theme="light"] {
  --bg:         #f8f7f2;
  --bg-2:       #ffffff;
  --bg-3:       #f0ede6;
  --bg-4:       #e8e4db;
  --border:     #00000018;
  --border-hard:#00000033;
  --text:       #111111;
  --text-2:     #555555;
  --text-3:     #999999;
  --shadow-neo: 4px 4px 0px #00000022;
  --shadow-neo-sm: 3px 3px 0px #00000018;
  --shadow-hover: 6px 6px 0px #00000015;
  --yellow-dim: #f5e64233;
}

/* ── 2. Reset & Base ──────────────────────────────────────────── */
*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
html { scroll-behavior:smooth; }
body {
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  line-height: 1.6;
  overflow-x: hidden;
  transition: background .2s, color .2s;
}
a { color: var(--yellow); text-decoration:none; }
a:hover { text-decoration:underline; }
button { cursor:pointer; font-family: var(--font-body); }
input, textarea, select { font-family: var(--font-body); }
::selection { background:var(--yellow); color:#000; }
::-webkit-scrollbar { width:5px; height:5px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--bg-4); border-radius:3px; }
::-webkit-scrollbar-thumb:hover { background:var(--border-hard); }

/* ── 3. Layout ─────────────────────────────────────────────────── */
#app { display:flex; min-height:100vh; }

/* Sidebar */
#sidebar {
  width: var(--sidebar-w);
  background: var(--bg-2);
  border-right: 1.5px solid var(--border-hard);
  display: flex;
  flex-direction: column;
  position: fixed;
  top:0; left:0; bottom:0;
  z-index:100;
  overflow-y:auto;
  transition: transform var(--trans);
}

.sidebar-logo {
  padding: 20px 18px 16px;
  border-bottom: 1.5px solid var(--border-hard);
  display:flex; align-items:center; gap:12px;
}
.logo-mark {
  width:36px; height:36px;
  background: var(--yellow);
  border: 2px solid var(--text);
  border-radius: var(--radius);
  display:flex; align-items:center; justify-content:center;
  box-shadow: var(--shadow-neo-sm);
  flex-shrink:0;
}
.logo-mark svg { color:#000; }
.logo-text h1 {
  font-family: var(--font-display);
  font-size:15px; font-weight:800;
  color:var(--text); letter-spacing:-.02em;
}
.logo-text span { font-size:11px; color:var(--text-3); }

.sidebar-nav { padding:8px 0; flex:1; }
.nav-group-label {
  font-size:10px; font-weight:700; color:var(--text-3);
  letter-spacing:.1em; text-transform:uppercase;
  padding:14px 16px 5px;
}
.nav-item {
  display:flex; align-items:center; gap:10px;
  padding:9px 16px;
  font-size:13.5px; font-weight:500;
  color: var(--text-2);
  background:none; border:none; width:100%; text-align:left;
  border-radius:0;
  transition: background var(--trans), color var(--trans);
  cursor:pointer; position:relative;
}
.nav-item:hover { background:var(--bg-3); color:var(--text); }
.nav-item.active {
  background: var(--yellow-dim);
  color: var(--yellow);
  font-weight: 600;
}
.nav-item.active::before {
  content:'';
  position:absolute; left:0; top:4px; bottom:4px;
  width:3px; background:var(--yellow);
  border-radius:0 2px 2px 0;
}
.nav-icon {
  width:18px; height:18px;
  display:flex; align-items:center; justify-content:center;
  flex-shrink:0; opacity:.7;
}
.nav-item.active .nav-icon { opacity:1; }
.nav-item:hover .nav-icon { opacity:1; }

/* Sidebar progress */
.sidebar-footer {
  padding:14px 16px;
  border-top:1.5px solid var(--border-hard);
}
.sp-row { display:flex; justify-content:space-between; align-items:center; margin-bottom:7px; }
.sp-label { font-size:11px; color:var(--text-2); font-weight:600; }
.sp-val   { font-size:11px; color:var(--yellow); font-weight:700; font-family:var(--font-mono); }
.prog-track {
  height:6px; background:var(--bg-4); border-radius:3px; overflow:hidden;
  border: 1px solid var(--border);
}
.prog-fill {
  height:100%;
  background: linear-gradient(90deg, var(--yellow), var(--orange));
  border-radius:3px;
  transition:width .6s ease;
}

/* Main */
#main { margin-left:var(--sidebar-w); flex:1; display:flex; flex-direction:column; min-height:100vh; }

/* Topbar */
#topbar {
  height: var(--header-h);
  background: var(--bg-2);
  border-bottom: 1.5px solid var(--border-hard);
  display:flex; align-items:center;
  padding:0 24px; gap:14px;
  position:sticky; top:0; z-index:90;
}
#topbar-title {
  font-family: var(--font-display);
  font-size:16px; font-weight:700;
  flex:1; letter-spacing:-.01em;
}
.topbar-search {
  display:flex; align-items:center; gap:8px;
  background:var(--bg-3);
  border: 1.5px solid var(--border-hard);
  border-radius: var(--radius);
  padding:7px 12px;
  width:260px;
  transition: border-color var(--trans);
}
.topbar-search:focus-within {
  border-color: var(--yellow);
  box-shadow: 0 0 0 3px var(--yellow-dim);
}
.topbar-search input {
  background:none; border:none; outline:none;
  color:var(--text); font-size:13px; width:100%;
}
.topbar-search input::placeholder { color:var(--text-3); }
.topbar-actions { display:flex; gap:6px; }

.icon-btn {
  width:34px; height:34px;
  display:flex; align-items:center; justify-content:center;
  background: var(--bg-3);
  border: 1.5px solid var(--border-hard);
  border-radius: var(--radius);
  color: var(--text-2);
  transition: all var(--trans);
}
.icon-btn:hover {
  background:var(--yellow-dim);
  border-color:var(--yellow);
  color:var(--yellow);
  box-shadow: var(--shadow-neo-sm);
}
.icon-btn svg { width:16px; height:16px; }

/* Sections */
.section { display:none; padding:24px; animation:fadeUp .2s ease; }
.section.active { display:block; }
@keyframes fadeUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:none} }

.sec-header { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:24px; flex-wrap:wrap; gap:12px; }
.sec-header h2 {
  font-family:var(--font-display);
  font-size:22px; font-weight:800;
  letter-spacing:-.02em; color:var(--text);
}
.sec-header p { font-size:13px; color:var(--text-2); margin-top:3px; }

/* ── 4. Neobrutalist Cards ─────────────────────────────────────── */
.nb-card {
  background: var(--bg-2);
  border: 1.5px solid var(--border-hard);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-neo);
  transition: box-shadow var(--trans), transform var(--trans);
}
.nb-card:hover {
  box-shadow: var(--shadow-hover);
  transform: translate(-1px,-1px);
}

/* ── 5. Buttons ─────────────────────────────────────────────────── */
.btn {
  display:inline-flex; align-items:center; gap:6px;
  padding:8px 16px;
  border-radius:var(--radius);
  font-size:13px; font-weight:600;
  border: 1.5px solid var(--border-hard);
  background: var(--bg-3);
  color: var(--text);
  transition: all var(--trans);
  font-family:var(--font-body);
  white-space:nowrap;
}
.btn svg { width:14px; height:14px; flex-shrink:0; }
.btn:hover {
  background:var(--bg-4);
  border-color:var(--text-2);
  box-shadow: var(--shadow-neo-sm);
  transform:translate(-1px,-1px);
}
.btn-yellow { background:var(--yellow); color:#000; border-color:var(--yellow); }
.btn-yellow:hover { background:#ffe800; border-color:#ffe800; color:#000; }
.btn-green  { background:var(--green-dim); color:var(--green); border-color:var(--green); }
.btn-red    { background:var(--red-dim); color:var(--red); border-color:var(--red); }
.btn-sm { padding:5px 10px; font-size:12px; }
.btn-xs { padding:3px 8px; font-size:11px; }

/* ── 6. Badges ──────────────────────────────────────────────────── */
.badge {
  display:inline-flex; align-items:center;
  padding:3px 8px; border-radius:4px;
  font-size:11px; font-weight:700;
  font-family:var(--font-mono); letter-spacing:.02em;
  border: 1px solid;
}
.badge-easy   { background:var(--green-dim);  color:var(--green);  border-color:var(--green)44; }
.badge-medium { background:var(--orange-dim); color:var(--orange); border-color:var(--orange)44; }
.badge-hard   { background:var(--red-dim);    color:var(--red);    border-color:var(--red)44; }
.badge-yellow { background:var(--yellow-dim); color:var(--yellow); border-color:var(--yellow)44; }
.badge-blue   { background:var(--blue-dim);   color:var(--blue);   border-color:var(--blue)44; }
.badge-purple { background:var(--purple-dim); color:var(--purple); border-color:var(--purple)44; }
.badge-teal   { background:var(--teal-dim);   color:var(--teal);   border-color:var(--teal)44; }

/* Pattern tag */
.pattern-tag {
  display:inline-flex; padding:3px 8px; border-radius:4px; font-size:11px; font-weight:600;
  background:var(--blue-dim); color:var(--blue); border:1px solid var(--blue)33;
}
.co-tag {
  padding:2px 6px; border-radius:4px; font-size:10px; font-weight:500;
  background:var(--bg-4); color:var(--text-2);
  border:1px solid var(--border);
}
.plat-badge {
  padding:2px 7px; border-radius:4px; font-size:10px; font-weight:700;
  font-family:var(--font-mono);
  background:var(--bg-4); color:var(--text-3);
  border:1px solid var(--border);
}

/* ── 7. Dashboard ───────────────────────────────────────────────── */
.stats-grid {
  display:grid;
  grid-template-columns: repeat(auto-fit,minmax(150px,1fr));
  gap:14px; margin-bottom:22px;
}
.stat-card {
  padding:18px 16px;
  border-radius:var(--radius-lg);
  border:1.5px solid var(--border-hard);
  background:var(--bg-2);
  box-shadow: var(--shadow-neo);
  transition: all var(--trans);
  position:relative; overflow:hidden;
}
.stat-card:hover { box-shadow:var(--shadow-hover); transform:translate(-1px,-1px); }
.stat-card-accent {
  position:absolute; top:0; left:0; right:0; height:3px;
  border-radius:var(--radius-lg) var(--radius-lg) 0 0;
}
.stat-val {
  font-family:var(--font-display);
  font-size:30px; font-weight:800; line-height:1; letter-spacing:-.03em;
  margin-top:4px;
}
.stat-label { font-size:12px; color:var(--text-2); font-weight:600; margin-top:5px; }
.stat-sub   { font-size:11px; color:var(--text-3); margin-top:3px; }
.stat-icon  { position:absolute; top:14px; right:14px; opacity:.15; }
.stat-icon svg { width:28px; height:28px; }

.dash-2col { display:grid; grid-template-columns:3fr 2fr; gap:18px; }
@media(max-width:960px){ .dash-2col { grid-template-columns:1fr; } }

/* Motivational banner */
.quote-banner {
  background: linear-gradient(135deg, var(--bg-2), var(--bg-3));
  border: 1.5px solid var(--border-hard);
  border-radius: var(--radius-lg);
  padding:18px 20px;
  margin-bottom:20px;
  box-shadow: var(--shadow-neo);
  position:relative; overflow:hidden;
}
.quote-banner::before {
  content:'"';
  position:absolute; top:-10px; right:16px;
  font-size:100px; color:var(--yellow);
  opacity:.08; font-family:var(--font-display); font-weight:900;
  pointer-events:none;
}
.quote-text  { font-size:14px; font-style:italic; color:var(--text); line-height:1.6; }
.quote-author{ font-size:11px; color:var(--text-3); margin-top:6px; font-weight:600; letter-spacing:.05em; }

/* Daily challenge */
.daily-card {
  background: var(--bg-2);
  border: 1.5px solid var(--yellow)66;
  border-radius: var(--radius-lg);
  padding: 16px 18px;
  margin-bottom: 20px;
  box-shadow: 4px 4px 0px var(--yellow)22;
  display:flex; align-items:center; gap:16px; flex-wrap:wrap;
}
.daily-badge {
  background:var(--yellow); color:#000;
  font-size:10px; font-weight:800; letter-spacing:.08em;
  padding:4px 8px; border-radius:4px; border:1px solid #000;
  white-space:nowrap; align-self:flex-start;
  font-family:var(--font-display);
}
.daily-info { flex:1; min-width:180px; }
.daily-title { font-family:var(--font-display); font-size:16px; font-weight:700; margin-bottom:6px; }
.daily-meta  { display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
.daily-actions { display:flex; gap:8px; flex-wrap:wrap; }

/* Section card */
.sec-card {
  background:var(--bg-2);
  border:1.5px solid var(--border-hard);
  border-radius:var(--radius-lg);
  padding:18px;
  box-shadow:var(--shadow-neo);
}
.sec-card-title {
  font-family:var(--font-display);
  font-size:14px; font-weight:700;
  color:var(--text); margin-bottom:14px;
  display:flex; align-items:center; gap:8px;
}
.sec-card-title svg { width:16px; height:16px; color:var(--yellow); }

.recent-item {
  display:flex; align-items:center; gap:10px;
  padding:9px 10px;
  border-radius:var(--radius);
  background:var(--bg-3);
  border:1px solid var(--border);
  margin-bottom:7px;
  font-size:13px;
  transition:all var(--trans);
}
.recent-item:last-child { margin-bottom:0; }
.recent-item:hover { border-color:var(--yellow)44; background:var(--bg-4); }
.ri-title { flex:1; font-weight:500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.ri-date  { font-size:11px; color:var(--text-3); font-family:var(--font-mono); white-space:nowrap; }

/* Quick actions */
.quick-btn {
  display:flex; align-items:center; gap:10px;
  padding:10px 14px;
  background:var(--bg-3); border:1.5px solid var(--border-hard);
  border-radius:var(--radius); color:var(--text);
  font-size:13px; font-weight:500; width:100%;
  text-align:left; cursor:pointer;
  transition:all var(--trans); margin-bottom:7px;
}
.quick-btn:last-child { margin-bottom:0; }
.quick-btn svg { width:16px; height:16px; color:var(--text-2); flex-shrink:0; }
.quick-btn:hover { border-color:var(--yellow)66; background:var(--yellow-dim); color:var(--yellow); }
.quick-btn:hover svg { color:var(--yellow); }

/* Overall progress bar */
.overall-prog {
  background:var(--bg-2); border:1.5px solid var(--border-hard);
  border-radius:var(--radius-lg); padding:16px 18px;
  margin-bottom:18px; box-shadow:var(--shadow-neo);
}
.overall-prog-header {
  display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;
}
.overall-prog-label { font-weight:700; font-size:13px; font-family:var(--font-display); }
.overall-prog-val   { font-family:var(--font-mono); font-size:13px; color:var(--yellow); font-weight:700; }
.prog-bar-thick {
  height:10px; background:var(--bg-4);
  border-radius:5px; overflow:hidden;
  border:1px solid var(--border);
}
.prog-bar-fill {
  height:100%;
  background:linear-gradient(90deg,var(--yellow),var(--orange));
  border-radius:5px;
  transition:width .6s ease;
}

/* ── 8. Questions ───────────────────────────────────────────────── */
.filter-bar {
  background:var(--bg-2);
  border:1.5px solid var(--border-hard);
  border-radius:var(--radius-lg);
  padding:14px 16px;
  margin-bottom:16px;
  box-shadow:var(--shadow-neo);
  display:flex; flex-wrap:wrap; gap:10px; align-items:center;
}
.filter-group { display:flex; gap:6px; align-items:center; }
.filter-lbl { font-size:11px; font-weight:700; color:var(--text-3); text-transform:uppercase; letter-spacing:.06em; }

.diff-btn {
  padding:5px 12px; border-radius:20px;
  font-size:12px; font-weight:700;
  border:1.5px solid var(--border-hard);
  background:transparent; cursor:pointer;
  transition:all var(--trans); font-family:var(--font-body);
}
.diff-btn:hover { border-color:var(--text-2); color:var(--text); }
.diff-btn.easy   { color:var(--text-2); }
.diff-btn.medium { color:var(--text-2); }
.diff-btn.hard   { color:var(--text-2); }
.diff-btn.easy.active   { background:var(--green-dim);  color:var(--green);  border-color:var(--green); }
.diff-btn.medium.active { background:var(--orange-dim); color:var(--orange); border-color:var(--orange); }
.diff-btn.hard.active   { background:var(--red-dim);    color:var(--red);    border-color:var(--red); }

.filt-select {
  padding:6px 10px; border-radius:var(--radius); font-size:12px; font-weight:600;
  border:1.5px solid var(--border-hard); background:var(--bg-3); color:var(--text);
  outline:none; cursor:pointer; transition:border-color var(--trans);
}
.filt-select:focus { border-color:var(--yellow); }

.q-count-badge {
  margin-left:auto;
  font-size:12px; font-weight:700; font-family:var(--font-mono);
  color:var(--text-3);
  background:var(--bg-3); border:1px solid var(--border);
  padding:4px 10px; border-radius:20px;
}

/* Questions table */
.q-table-wrap { overflow-x:auto; }
.q-table {
  width:100%; border-collapse:collapse; font-size:13.5px;
  border:1.5px solid var(--border-hard);
  border-radius:var(--radius-lg); overflow:hidden;
}
.q-table th {
  padding:11px 14px;
  background:var(--bg-3);
  border-bottom:1.5px solid var(--border-hard);
  color:var(--text-3); font-size:11px; font-weight:700;
  text-transform:uppercase; letter-spacing:.06em;
  text-align:left; white-space:nowrap;
}
.q-table td {
  padding:11px 14px;
  border-bottom:1px solid var(--border);
  vertical-align:middle;
}
.q-table tr:last-child td { border-bottom:none; }
.q-table tbody tr { transition:background var(--trans); }
.q-table tbody tr:hover td { background:var(--bg-3); }
.q-table tbody tr.solved td { opacity:.55; }
.q-table tbody tr.solved .q-title-link { text-decoration:line-through; }

.q-title-link {
  font-weight:600; color:var(--text);
  font-size:13.5px; cursor:pointer;
}
.q-title-link:hover { color:var(--yellow); text-decoration:none; }

.company-tags { display:flex; flex-wrap:wrap; gap:4px; max-width:200px; }

.q-action-btn {
  width:30px; height:30px; border-radius:var(--radius);
  border:1.5px solid var(--border-hard);
  background:transparent; color:var(--text-3);
  display:inline-flex; align-items:center; justify-content:center;
  cursor:pointer; transition:all var(--trans);
}
.q-action-btn svg { width:14px; height:14px; }
.q-action-btn:hover { border-color:var(--text-2); color:var(--text); background:var(--bg-4); }
.q-action-btn.is-solved  { color:var(--green);  border-color:var(--green)66;  background:var(--green-dim); }
.q-action-btn.is-fav     { color:var(--yellow); border-color:var(--yellow)66; background:var(--yellow-dim); }
.q-action-btn.is-bookmarked { color:var(--blue); border-color:var(--blue)66;  background:var(--blue-dim); }
.q-actions { display:flex; gap:5px; }

/* Pagination */
.pagination { display:flex; gap:5px; align-items:center; margin-top:16px; flex-wrap:wrap; }
.pg-btn {
  min-width:32px; height:32px; padding:0 8px;
  border-radius:var(--radius);
  border:1.5px solid var(--border-hard);
  background:var(--bg-3); color:var(--text-2);
  font-size:12px; font-weight:600;
  display:inline-flex; align-items:center; justify-content:center;
  cursor:pointer; transition:all var(--trans); font-family:var(--font-mono);
}
.pg-btn:hover:not(:disabled) { border-color:var(--yellow)66; color:var(--yellow); background:var(--yellow-dim); }
.pg-btn.active { background:var(--yellow); color:#000; border-color:var(--yellow); }
.pg-btn:disabled { opacity:.3; cursor:default; }
.pg-info { margin-left:auto; font-size:11px; color:var(--text-3); font-family:var(--font-mono); }

/* ── 9. Patterns ────────────────────────────────────────────────── */
.patterns-grid {
  display:grid;
  grid-template-columns: repeat(auto-fill, minmax(320px,1fr));
  gap:16px;
}
.pattern-card {
  background:var(--bg-2);
  border:1.5px solid var(--border-hard);
  border-radius:var(--radius-lg);
  padding:16px;
  box-shadow:var(--shadow-neo);
  transition:all var(--trans);
}
.pattern-card:hover { box-shadow:var(--shadow-hover); transform:translate(-1px,-1px); }
.pattern-card-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; }
.pattern-card-name {
  font-family:var(--font-display); font-size:15px; font-weight:700;
}
.pattern-card-count { font-size:12px; color:var(--text-3); font-family:var(--font-mono); }
.pattern-prog-track { height:6px; background:var(--bg-4); border-radius:3px; overflow:hidden; margin-bottom:10px; border:1px solid var(--border); }
.pattern-prog-fill  { height:100%; border-radius:3px; background:linear-gradient(90deg,var(--yellow),var(--orange)); transition:width .6s ease; }
.pattern-pills { display:flex; flex-wrap:wrap; gap:5px; margin-bottom:10px; }
.pattern-pill {
  padding:3px 8px; border-radius:4px; font-size:11px; font-weight:500;
  border:1px solid var(--border); background:var(--bg-3); color:var(--text-2);
  cursor:pointer; transition:all var(--trans); text-decoration:none; display:inline-block;
}
.pattern-pill:hover { border-color:var(--yellow)44; color:var(--yellow); text-decoration:none; }
.pattern-pill.solved { background:var(--green-dim); color:var(--green); border-color:var(--green)44; }

/* ── 10. Notes ──────────────────────────────────────────────────── */
.notes-layout { display:grid; grid-template-columns:220px 1fr; gap:18px; }
@media(max-width:750px) { .notes-layout { grid-template-columns:1fr; } }

.note-cats { display:flex; flex-direction:column; gap:5px; }
.cat-btn {
  padding:8px 12px; border-radius:var(--radius); font-size:13px; font-weight:500;
  border:1.5px solid var(--border-hard); background:var(--bg-3); color:var(--text-2);
  cursor:pointer; text-align:left; transition:all var(--trans); font-family:var(--font-body);
  display:flex; align-items:center; gap:8px;
}
.cat-btn svg { width:14px; height:14px; flex-shrink:0; }
.cat-btn:hover { background:var(--bg-4); color:var(--text); border-color:var(--text-2); }
.cat-btn.active { background:var(--yellow-dim); color:var(--yellow); border-color:var(--yellow)66; font-weight:600; }
.cat-btn.active svg { color:var(--yellow); }

.note-card {
  background:var(--bg-3); border:1.5px solid var(--border-hard);
  border-radius:var(--radius-lg); padding:14px; margin-bottom:9px;
  cursor:pointer; transition:all var(--trans);
}
.note-card:hover { border-color:var(--yellow)44; background:var(--bg-4); }
.note-card.selected { border-color:var(--yellow); background:var(--yellow-dim); }
.note-title { font-weight:700; font-size:14px; font-family:var(--font-display); margin-bottom:5px; }
.note-preview { font-size:12px; color:var(--text-2); overflow:hidden; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; line-height:1.5; }
.note-foot { font-size:11px; color:var(--text-3); margin-top:8px; display:flex; justify-content:space-between; }

.note-editor-area { display:flex; flex-direction:column; gap:10px; }
.nb-input {
  padding:9px 12px;
  background:var(--bg-3); border:1.5px solid var(--border-hard);
  border-radius:var(--radius); color:var(--text); font-size:13.5px;
  outline:none; transition:border-color var(--trans); width:100%;
}
.nb-input:focus { border-color:var(--yellow); box-shadow:0 0 0 3px var(--yellow-dim); }
.nb-input::placeholder { color:var(--text-3); }
textarea.nb-input { resize:vertical; min-height:280px; font-family:var(--font-mono); font-size:13px; line-height:1.7; }

/* ── 11. Articles ───────────────────────────────────────────────── */
.articles-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(290px,1fr)); gap:14px; }
.article-card {
  background:var(--bg-2); border:1.5px solid var(--border-hard);
  border-radius:var(--radius-lg); padding:16px;
  display:flex; flex-direction:column; gap:10px;
  box-shadow:var(--shadow-neo); transition:all var(--trans);
}
.article-card:hover { box-shadow:var(--shadow-hover); transform:translate(-1px,-1px); }
.article-title { font-weight:700; font-size:14px; font-family:var(--font-display); }
.article-domain { font-size:11px; color:var(--text-3); font-family:var(--font-mono); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.article-tags { display:flex; gap:5px; flex-wrap:wrap; }
.article-tag { padding:2px 7px; border-radius:4px; font-size:10px; font-weight:600; background:var(--yellow-dim); color:var(--yellow); border:1px solid var(--yellow)33; }
.article-foot { margin-top:auto; display:flex; gap:7px; }

.add-form {
  background:var(--bg-2); border:1.5px solid var(--border-hard);
  border-radius:var(--radius-lg); padding:16px;
  margin-bottom:18px; box-shadow:var(--shadow-neo);
  display:flex; flex-wrap:wrap; gap:10px; align-items:flex-end;
}
.form-field { display:flex; flex-direction:column; gap:5px; flex:1; min-width:180px; }
.form-label { font-size:11px; font-weight:700; color:var(--text-3); text-transform:uppercase; letter-spacing:.06em; }

/* ── 12. Videos ─────────────────────────────────────────────────── */
.videos-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(250px,1fr)); gap:14px; }
.video-card {
  background:var(--bg-2); border:1.5px solid var(--border-hard);
  border-radius:var(--radius-lg); padding:14px;
  display:flex; flex-direction:column; gap:10px;
  box-shadow:var(--shadow-neo); transition:all var(--trans);
}
.video-card:hover { box-shadow:var(--shadow-hover); transform:translate(-1px,-1px); }
.video-thumb {
  height:76px; border-radius:var(--radius);
  background:var(--bg-3); border:1px solid var(--border);
  display:flex; align-items:center; justify-content:center;
  font-size:26px; position:relative; overflow:hidden;
}
.video-thumb::after {
  content:'';
  position:absolute; inset:0;
  background:linear-gradient(135deg, transparent 60%, var(--yellow-dim));
}
.video-title { font-weight:700; font-size:13px; font-family:var(--font-display); line-height:1.4; }
.video-meta  { font-size:11px; color:var(--text-2); display:flex; gap:6px; align-items:center; }
.video-foot  { margin-top:auto; }

/* ── 13. Timer ──────────────────────────────────────────────────── */
.timer-wrap {
  max-width:480px; margin:0 auto; text-align:center;
}
.timer-modes-row { display:flex; gap:8px; justify-content:center; margin-bottom:24px; }
.tmode-btn {
  padding:8px 20px; border-radius:20px; font-size:13px; font-weight:600;
  border:1.5px solid var(--border-hard); background:var(--bg-3); color:var(--text-2);
  cursor:pointer; transition:all var(--trans); font-family:var(--font-body);
  display:flex; align-items:center; gap:7px;
}
.tmode-btn svg { width:14px; height:14px; }
.tmode-btn:hover { border-color:var(--text-2); color:var(--text); }
.tmode-btn.active { background:var(--yellow); color:#000; border-color:var(--yellow); box-shadow:var(--shadow-neo-sm); }
.tmode-btn.active svg { color:#000; }

.timer-display {
  font-family: var(--font-mono);
  font-size:80px; font-weight:700;
  letter-spacing:-.03em; line-height:1;
  color:var(--text);
  margin:20px 0 8px;
  transition:color var(--trans);
}
.timer-display.work  { color:var(--yellow); }
.timer-display.brk   { color:var(--green); }

.timer-phase-lbl { font-size:14px; color:var(--text-2); min-height:22px; font-weight:600; margin-bottom:20px; }

.timer-controls { display:flex; gap:10px; justify-content:center; flex-wrap:wrap; }
.t-btn {
  padding:11px 28px; border-radius:var(--radius);
  font-size:14px; font-weight:700;
  border:1.5px solid var(--border-hard);
  background:var(--bg-3); color:var(--text);
  cursor:pointer; transition:all var(--trans); font-family:var(--font-body);
  display:flex; align-items:center; gap:8px;
}
.t-btn svg { width:16px; height:16px; }
.t-btn:hover { transform:translate(-1px,-1px); box-shadow:var(--shadow-neo-sm); }
.t-btn-start { background:var(--yellow); color:#000; border-color:var(--yellow); }
.t-btn-start:hover { background:#ffe800; color:#000; }
.t-btn-pause { background:var(--orange-dim); color:var(--orange); border-color:var(--orange); }
.t-btn-stop  { background:var(--red-dim); color:var(--red); border-color:var(--red); }

.custom-time-inputs { display:flex; gap:6px; justify-content:center; align-items:center; margin:14px 0; }
.custom-time-inputs input {
  width:64px; padding:8px; text-align:center;
  background:var(--bg-3); border:1.5px solid var(--border-hard);
  border-radius:var(--radius); color:var(--text);
  font-size:20px; font-weight:700; font-family:var(--font-mono);
  outline:none;
}
.custom-time-inputs input:focus { border-color:var(--yellow); }
.custom-time-inputs span { color:var(--text-3); font-size:22px; font-weight:700; font-family:var(--font-mono); }

.pomo-info {
  display:none; margin-bottom:12px;
  background:var(--bg-3); border:1.5px solid var(--border);
  border-radius:var(--radius); padding:10px 16px;
  font-size:13px; color:var(--text-2); text-align:center;
}
.timer-cycles { margin-top:16px; font-size:12px; color:var(--text-3); font-family:var(--font-mono); }

/* ── 14. Progress Charts ─────────────────────────────────────────── */
.charts-grid { display:grid; grid-template-columns:1fr 2fr; gap:18px; }
@media(max-width:800px){ .charts-grid { grid-template-columns:1fr; } }
.chart-card {
  background:var(--bg-2); border:1.5px solid var(--border-hard);
  border-radius:var(--radius-lg); padding:18px;
  box-shadow:var(--shadow-neo);
}
.chart-head {
  font-family:var(--font-display); font-size:13px; font-weight:700;
  color:var(--text-2); text-transform:uppercase; letter-spacing:.07em;
  margin-bottom:16px; display:flex; align-items:center; gap:8px;
}
.chart-head svg { width:15px; height:15px; color:var(--yellow); }

.bar-item { margin-bottom:12px; }
.bar-item:last-child { margin-bottom:0; }
.bar-row { display:flex; justify-content:space-between; font-size:12px; margin-bottom:5px; }
.bar-row span:first-child { font-weight:600; color:var(--text); }
.bar-row span:last-child  { font-family:var(--font-mono); color:var(--text-3); font-size:11px; }
.bar-track { height:8px; background:var(--bg-4); border-radius:4px; overflow:hidden; border:1px solid var(--border); }
.bar-fill  { height:100%; border-radius:4px; transition:width .7s ease; }

/* ── 15. Heatmap Calendar ─────────────────────────────────────────── */
.heatmap-stats {
  display:flex; gap:24px; margin-bottom:20px; flex-wrap:wrap;
}
.hstat-card {
  background:var(--bg-3); border:1.5px solid var(--border-hard);
  border-radius:var(--radius-lg); padding:14px 20px;
  text-align:center; flex:1; min-width:100px;
  box-shadow:var(--shadow-neo-sm);
}
.hstat-val   { font-family:var(--font-display); font-size:28px; font-weight:800; color:var(--yellow); display:block; }
.hstat-label { font-size:11px; color:var(--text-3); font-weight:600; text-transform:uppercase; letter-spacing:.06em; margin-top:2px; }

/* Heatmap grid — FIXED layout using flex, not CSS grid columns */
.heatmap-scroll { overflow-x:auto; padding-bottom:6px; }
.heatmap-inner  { display:inline-flex; flex-direction:column; gap:0; min-width:max-content; }
.heatmap-months {
  display:flex; margin-bottom:4px;
  padding-left:26px; /* offset for day labels */
}
.heatmap-month-label {
  font-size:10px; color:var(--text-3);
  font-family:var(--font-mono); font-weight:600;
  pointer-events:none; white-space:nowrap;
}
.heatmap-body { display:flex; gap:0; }
.heatmap-day-labels {
  display:flex; flex-direction:column; gap:2px;
  margin-right:4px; padding-top:0;
}
.heatmap-day-labels span {
  font-size:9px; color:var(--text-3); font-family:var(--font-mono);
  height:13px; line-height:13px; width:18px; text-align:right;
}
.heatmap-weeks { display:flex; gap:2px; }
.heatmap-week  { display:flex; flex-direction:column; gap:2px; }
.cal-cell {
  width:13px; height:13px; border-radius:2px;
  background:var(--bg-4);
  cursor:default; transition:transform .1s; flex-shrink:0;
  border:1px solid var(--border);
}
.cal-cell:hover { transform:scale(1.4); z-index:1; position:relative; outline:1.5px solid var(--yellow); }
.cal-cell.future { opacity:.2; }
.cal-cell.l0 { background:var(--bg-4); }
.cal-cell.l1 { background:#1a3a2a; border-color:#22c55e22; }
.cal-cell.l2 { background:#166534; border-color:#22c55e44; }
.cal-cell.l3 { background:#15803d; border-color:#22c55e66; }
.cal-cell.l4 { background:#22c55e; border-color:#22c55e; }
[data-theme="light"] .cal-cell.l1 { background:#bbf7d0; border-color:#22c55e44; }
[data-theme="light"] .cal-cell.l2 { background:#86efac; border-color:#22c55e66; }
[data-theme="light"] .cal-cell.l3 { background:#4ade80; border-color:#22c55e; }
[data-theme="light"] .cal-cell.l4 { background:#16a34a; border-color:#15803d; }

.heatmap-legend { display:flex; align-items:center; gap:4px; margin-top:10px; font-size:10px; color:var(--text-3); }

/* ── 16. Settings ───────────────────────────────────────────────── */
.settings-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(280px,1fr)); gap:18px; }
.settings-card {
  background:var(--bg-2); border:1.5px solid var(--border-hard);
  border-radius:var(--radius-lg); padding:18px;
  box-shadow:var(--shadow-neo);
}
.settings-card h3 {
  font-family:var(--font-display); font-size:14px; font-weight:800;
  margin-bottom:14px; display:flex; align-items:center; gap:8px;
}
.settings-card h3 svg { width:16px; height:16px; color:var(--yellow); }
.settings-row {
  display:flex; align-items:center; justify-content:space-between;
  padding:10px 0; border-bottom:1px solid var(--border);
}
.settings-row:last-child { border-bottom:none; }
.settings-row label { font-size:13px; font-weight:600; }
.settings-row p { font-size:11px; color:var(--text-3); margin-top:2px; }

/* Toggle */
.tog-sw { position:relative; width:42px; height:22px; }
.tog-sw input { opacity:0; width:0; height:0; position:absolute; }
.tog-track {
  position:absolute; inset:0; border-radius:22px;
  background:var(--bg-4); border:1.5px solid var(--border-hard);
  cursor:pointer; transition:all var(--trans);
}
.tog-track::before {
  content:''; position:absolute;
  width:14px; height:14px; border-radius:50%;
  background:var(--text-3); left:3px; top:2px; transition:all var(--trans);
}
.tog-sw input:checked + .tog-track { background:var(--yellow-dim); border-color:var(--yellow); }
.tog-sw input:checked + .tog-track::before { background:var(--yellow); transform:translateX(20px); }

/* ── 17. Toast ──────────────────────────────────────────────────── */
#toast-container { position:fixed; bottom:20px; right:20px; z-index:9999; display:flex; flex-direction:column; gap:8px; }
.toast {
  padding:11px 16px; border-radius:var(--radius);
  background:var(--bg-2); border:1.5px solid var(--border-hard);
  font-size:13px; font-weight:500; color:var(--text);
  box-shadow: 4px 4px 0px rgba(0,0,0,.4);
  display:flex; align-items:center; gap:9px;
  animation:slideIn .2s ease; max-width:320px;
}
.toast svg { width:16px; height:16px; flex-shrink:0; }
.toast.success { border-color:var(--green)66; }
.toast.success svg { color:var(--green); }
.toast.error   { border-color:var(--red)66; }
.toast.error svg { color:var(--red); }
.toast.info    { border-color:var(--yellow)66; }
.toast.info svg { color:var(--yellow); }
@keyframes slideIn { from{transform:translateX(20px);opacity:0} to{transform:none;opacity:1} }
@keyframes slideOut{ to{transform:translateX(20px);opacity:0} }

/* ── 18. Empty States ───────────────────────────────────────────── */
.empty {
  text-align:center; padding:48px 24px;
  color:var(--text-3); font-size:14px;
}
.empty svg { width:40px; height:40px; margin-bottom:12px; opacity:.4; }
.empty p { margin-top:6px; font-size:13px; }

/* ── 19. Mobile ─────────────────────────────────────────────────── */
.hamburger { display:none; padding:6px; background:none; border:none; flex-direction:column; gap:5px; }
.hamburger span { display:block; width:20px; height:2px; background:var(--text); border-radius:2px; transition:all var(--trans); }
.sidebar-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.7); z-index:99; }

@media(max-width:768px) {
  #sidebar { transform:translateX(-100%); box-shadow:8px 0 30px rgba(0,0,0,.5); }
  #sidebar.open { transform:translateX(0); }
  #main { margin-left:0; }
  .hamburger { display:flex; }
  .sidebar-overlay.show { display:block; }
  .section { padding:16px; }
  .topbar-search { display:none; }
  .stats-grid { grid-template-columns:repeat(2,1fr); }
  .dash-2col { grid-template-columns:1fr; }
  .charts-grid { grid-template-columns:1fr; }
  .q-table th:nth-child(4), .q-table td:nth-child(4),
  .q-table th:nth-child(5), .q-table td:nth-child(5) { display:none; }
  .notes-layout { grid-template-columns:1fr; }
  .patterns-grid { grid-template-columns:1fr; }
}

/* ── 20. Misc ───────────────────────────────────────────────────── */
.divider { height:1px; background:var(--border); margin:16px 0; }
.mono { font-family:var(--font-mono); }

@keyframes spin { to { transform:rotate(360deg); } }
.spinner { display:inline-block; width:16px; height:16px; border:2px solid var(--border-hard); border-top-color:var(--yellow); border-radius:50%; animation:spin .6s linear infinite; }

</style>
</head>
<body>

<div id="sidebar-overlay" class="sidebar-overlay"></div>

<div id="app">
  <aside id="sidebar">
    <div class="sidebar-logo">
      <div class="logo-mark">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
      </div>
      <div class="logo-text">
        <h1>DSA Prep</h1>
        <span>Interview Dashboard</span>
      </div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-group-label">Navigation</div>
      <div id="nav-items"></div>
    </nav>
    <div class="sidebar-footer">
      <div class="sp-row">
        <span class="sp-label">Progress</span>
        <span class="sp-val" id="sidebar-prog-label">0 / 0</span>
      </div>
      <div class="prog-track">
        <div class="prog-fill" id="sidebar-prog-fill" style="width:0%"></div>
      </div>
    </div>
  </aside>

  <div id="main">
    <header id="topbar">
      <button class="hamburger" id="hamburger" aria-label="Menu">
        <span></span><span></span><span></span>
      </button>
      <h2 id="topbar-title">Dashboard</h2>
      <div class="topbar-search">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color:var(--text-3);flex-shrink:0"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="topbar-search-input" placeholder="Search questions, patterns, companies…" autocomplete="off">
      </div>

<script>
// storage.js – Local Storage helpers

const Storage = (() => {
  const KEYS = {
    SOLVED:    "dsa_solved",
    FAVORITES: "dsa_favorites",
    BOOKMARKS: "dsa_bookmarks",
    NOTES:     "dsa_notes",
    ARTICLES:  "dsa_articles",
    THEME:     "dsa_theme",
    CALENDAR:  "dsa_calendar",
    TIMER:     "dsa_timer",
    DAILY:     "dsa_daily",
  };

  const get = key => {
    try { return JSON.parse(localStorage.getItem(key)) ?? null; }
    catch { return null; }
  };
  const set = (key, val) => localStorage.setItem(key, JSON.stringify(val));

  // ── Solved ──────────────────────────────────────────────────────────────
  const getSolved   = () => get(KEYS.SOLVED)    || {};
  const isSolved    = id  => !!(getSolved()[id]);
  const toggleSolved = id => {
    const s = getSolved();
    if(s[id]) {
      delete s[id];
    } else {
      s[id] = Date.now();
      // track calendar
      const today = new Date().toISOString().slice(0,10);
      const cal   = getCalendar();
      cal[today]  = (cal[today]||0)+1;
      set(KEYS.CALENDAR, cal);
    }
    set(KEYS.SOLVED, s);
    return !!s[id];
  };

  // ── Favorites ────────────────────────────────────────────────────────────
  const getFavorites   = () => get(KEYS.FAVORITES) || {};
  const isFavorite     = id  => !!(getFavorites()[id]);
  const toggleFavorite = id  => {
    const f=getFavorites();
    f[id] ? delete f[id] : (f[id]=true);
    set(KEYS.FAVORITES,f);
    return !!f[id];
  };

  // ── Bookmarks ────────────────────────────────────────────────────────────
  const getBookmarks   = () => get(KEYS.BOOKMARKS) || {};
  const isBookmarked   = id  => !!(getBookmarks()[id]);
  const toggleBookmark = id  => {
    const b=getBookmarks();
    b[id] ? delete b[id] : (b[id]=true);
    set(KEYS.BOOKMARKS,b);
    return !!b[id];
  };

  // ── Notes ────────────────────────────────────────────────────────────────
  const getNotes   = ()     => get(KEYS.NOTES)    || [];
  const saveNotes  = notes  => set(KEYS.NOTES, notes);

  // ── Articles ─────────────────────────────────────────────────────────────
  const getArticles  = ()     => get(KEYS.ARTICLES) || getDefaultArticles();
  const saveArticles = arr    => set(KEYS.ARTICLES, arr);

  // ── Theme ────────────────────────────────────────────────────────────────
  const getTheme  = ()    => get(KEYS.THEME) || "dark";
  const saveTheme = theme => set(KEYS.THEME, theme);

  // ── Calendar ─────────────────────────────────────────────────────────────
  const getCalendar  = ()  => get(KEYS.CALENDAR) || {};

  // ── Daily Challenge ──────────────────────────────────────────────────────
  const getDaily  = ()  => get(KEYS.DAILY) || {};

  // ── Reset ─────────────────────────────────────────────────────────────────
  const resetAll = () => Object.values(KEYS).forEach(k => localStorage.removeItem(k));

  // ── Export / Import ───────────────────────────────────────────────────────
  const exportData = () => {
    const data = {};
    Object.entries(KEYS).forEach(([k,v]) => { data[k] = get(v); });

  };
  const importData = json => {
    try {

      Object.entries(KEYS).forEach(([k,v]) => {
        if(data[k] !== undefined) set(v, data[k]);

      return true;
    } catch { return false; }

<script>
// timer.js – Study Timer + Pomodoro

const Timer = (() => {
  let intervalId = null;
  let seconds    = 0;
  let isRunning  = false;
  let mode       = "stopwatch";   // "stopwatch" | "pomodoro" | "custom"
  let pomPhase   = "work";        // "work" | "break"
  let pomCycles  = 0;
  let targetSecs = 0;
  let onTickCb   = null;
  let onDoneCb   = null;

  const POM_WORK  = 25 * 60;
  const POM_BREAK =  5 * 60;

  function pad(n) { return String(n).padStart(2,"0"); }

  function fmt(s) {
    const h = Math.floor(s/3600);
    const m = Math.floor((s%3600)/60);
    const sec = s%60;
    return h > 0 ? `${pad(h)}:${pad(m)}:${pad(sec)}` : `${pad(m)}:${pad(sec)}`;
  }

  function tick() {
    if(mode === "stopwatch") {
      seconds++;
    } else {
      seconds--;
      if(seconds <= 0) {
        seconds = 0;
        stop();
        if(onDoneCb) onDoneCb(mode, pomPhase);
        if(mode === "pomodoro") {
          pomCycles++;
          pomPhase = pomPhase === "work" ? "break" : "work";
          seconds  = pomPhase === "work" ? POM_WORK : POM_BREAK;
        }
      }
    }
    if(onTickCb) onTickCb(fmt(seconds), seconds);
  }

  function start(opts={}) {
    if(isRunning) return;
    mode = opts.mode || mode;
    if(mode === "pomodoro" && seconds === 0) {
      pomPhase = "work";
      pomCycles = 0;
      seconds = POM_WORK;
    }
    if(mode === "custom" && opts.totalSeconds) {
      seconds = opts.totalSeconds;
      targetSecs = opts.totalSeconds;
    }
    onTickCb = opts.onTick || onTickCb;
    onDoneCb = opts.onDone || onDoneCb;
    isRunning = true;
    intervalId = setInterval(tick, 1000);
  }

  function pause() {
    clearInterval(intervalId);
    intervalId = null;
    isRunning = false;
  }

  function stop() {
    pause();
    isRunning = false;
  }

  function reset() {
    stop();
    seconds = 0;
    pomPhase = "work";
    pomCycles = 0;
    if(onTickCb) onTickCb("00:00", 0);
  }

  function getState() {
    return { isRunning, seconds, mode, pomPhase, pomCycles, display: fmt(seconds) };
  }

  function setMode(m) { mode = m; }

  return { start, pause, stop, reset, getState, setMode, fmt, POM_WORK, POM_BREAK };
})();

window.Timer = Timer;

</script>
<script>
// notes.js – Note management helpers

const Notes = (() => {
  const CATS = ["Arrays","Linked List","Trees","Graphs","DP","Bit Manipulation","Interview Notes","Revision Notes","System Design","Other"];

  function getAll()        { return Storage.getNotes(); }
  function save(notes)     { Storage.saveNotes(notes); }

  function create(title, content, category) {
    const notes = getAll();
    const note  = { id: Date.now(), title, content, category: category || "Other", updatedAt: new Date().toISOString() };
    notes.unshift(note);
    save(notes);
    return note;
  }

  function update(id, changes) {
    const notes = getAll().map(n =>
      n.id === id ? { ...n, ...changes, updatedAt: new Date().toISOString() } : n
    );
    save(notes);
  }

  function remove(id) {
    save(getAll().filter(n => n.id !== id));
  }

  function search(q) {
    const lq = q.toLowerCase();
    return getAll().filter(n =>
      n.title.toLowerCase().includes(lq) ||
      n.content.toLowerCase().includes(lq) ||
      n.category.toLowerCase().includes(lq)
    );
  }

  function byCategory(cat) {
    return cat === "All" ? getAll() : getAll().filter(n => n.category === cat);
  }

  return { getAll, create, update, remove, search, byCategory, CATS };
})();

window.Notes = Notes;

</script>
<script>
// calendar.js – GitHub-style heatmap + streak (fixed month labels)

const Calendar = (() => {

  function getData() { return Storage.getCalendar(); }

  function getStreak() {
    const cal = getData();
    let streak = 0, longest = 0, cur = 0;
    let d = new Date();

    // Current streak — walk backwards from today
    for (let i = 0; i < 365; i++) {
      const key = localDate(d);
      if (cal[key] > 0) { streak++; }
      else if (i > 0)   { break; }
      d.setDate(d.getDate() - 1);
    }

    // Longest streak over all recorded days
    const sorted = Object.keys(cal).sort();
    for (let i = 0; i < sorted.length; i++) {
      if (cal[sorted[i]] > 0) {
        cur++;
        longest = Math.max(longest, cur);
        if (i < sorted.length - 1) {
          const a = new Date(sorted[i]);
          const b = new Date(sorted[i + 1]);
          const diff = (b - a) / 86400000;
          if (diff > 1) cur = 0;
        }
      }
    }

    const totalDays = Object.keys(cal).filter(k => cal[k] > 0).length;
    return { streak, longest, totalDays };
  }

  // Returns YYYY-MM-DD in LOCAL time (avoids UTC-offset bugs)
  function localDate(d) {
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, '0');
    const day = String(d.getDate()).padStart(2, '0');
    return `${y}-${m}-${day}`;
  }

  function renderHeatmap(containerId) {
    const el = document.getElementById(containerId);
    if (!el) return;
    const cal = getData();

    // ── Build cell array ─────────────────────────────────────────
    const today = new Date();
    today.setHours(12, 0, 0, 0); // noon to avoid DST edge cases

    // Go back 52 complete weeks (364 days) + align to Sunday
    const end   = new Date(today);
    const start = new Date(today);
    start.setDate(start.getDate() - 364);
    // snap start back to the Sunday of that week
    start.setDate(start.getDate() - start.getDay());

    const weeks = [];
    let week    = [];
    const cur   = new Date(start);

    while (cur <= end) {
      const key   = localDate(cur);
      const count = cal[key] || 0;
      week.push({ date: key, count, future: cur > today });
      if (week.length === 7) { weeks.push(week); week = []; }
      cur.setDate(cur.getDate() + 1);
    }
    if (week.length) weeks.push(week);

    const maxCount = Math.max(1, ...Object.values(cal).filter(v => v > 0), 1);

    // ── Month labels ─────────────────────────────────────────────
    // Each week column is 15px wide (13px cell + 2px gap).
    // We place a label only when the month changes, at the correct
    // pixel offset so labels don't pile up.
    const CELL_W = 15; // cell 13 + gap 2
    const DAY_LABEL_W = 26; // left offset for day-of-week labels

    const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    let   prevMonth = -1;
    const monthMarks = []; // { label, x }

    weeks.forEach((w, wi) => {
      const m = new Date(w[0].date).getMonth();
      if (m !== prevMonth) {
        monthMarks.push({ label: months[m], x: wi * CELL_W });
        prevMonth = m;
      }
    });

    // Build month label row as absolutely-positioned spans inside a relative div
    const totalWidth = weeks.length * CELL_W;
    let monthRowHTML = `<div style="position:relative;height:18px;width:${totalWidth}px;margin-left:${DAY_LABEL_W}px;margin-bottom:4px;">`;
    // Filter out labels that are too close to each other (< 28px apart)
    const filtered = [];
    monthMarks.forEach(m => {
      const last = filtered[filtered.length - 1];
      if (!last || m.x - last.x >= 28) filtered.push(m);
    });
    filtered.forEach(m => {
      monthRowHTML += `<span style="position:absolute;left:${m.x}px;font-size:10px;color:var(--text-3);font-family:var(--font-mono);font-weight:600;white-space:nowrap;">${m.label}</span>`;
    });
    monthRowHTML += '</div>';

    // ── Day labels (Mon / Wed / Fri only) ────────────────────────
    const dayNames = ['','M','','W','','F',''];
    let dayLabelsHTML = `<div class="heatmap-day-labels">`;
    dayNames.forEach(d => { dayLabelsHTML += `<span>${d}</span>`; });
    dayLabelsHTML += '</div>';

    // ── Cell grid ────────────────────────────────────────────────
    let gridHTML = '<div class="heatmap-weeks">';
    weeks.forEach(w => {
      gridHTML += '<div class="heatmap-week">';
      w.forEach(day => {
        let level = 0;
        if (!day.future && day.count > 0) {
          const r = day.count / maxCount;
          level = r < 0.25 ? 1 : r < 0.5 ? 2 : r < 0.75 ? 3 : 4;
        }
        const cls = day.future ? 'cal-cell future' : `cal-cell l${level}`;
        gridHTML += `<div class="${cls}" title="${day.date}: ${day.count} solved"></div>`;
      });
      gridHTML += '</div>';
    });
    gridHTML += '</div>';

    // ── Legend ────────────────────────────────────────────────────
    const legendHTML = `
      <div class="heatmap-legend" style="margin-top:10px;">
        <span>Less</span>
        <div class="cal-cell l0" style="flex-shrink:0"></div>
        <div class="cal-cell l1" style="flex-shrink:0"></div>
        <div class="cal-cell l2" style="flex-shrink:0"></div>
        <div class="cal-cell l3" style="flex-shrink:0"></div>
        <div class="cal-cell l4" style="flex-shrink:0"></div>
        <span>More</span>
      </div>`;

    const { streak, longest, totalDays } = getStreak();

    el.innerHTML = `
      <div class="heatmap-stats">
        <div class="hstat-card">
          <span class="hstat-val">${streak}</span>
          <div class="hstat-label">Current Streak</div>
        </div>
        <div class="hstat-card">
          <span class="hstat-val">${longest}</span>
          <div class="hstat-label">Longest Streak</div>
        </div>
        <div class="hstat-card">
          <span class="hstat-val">${totalDays}</span>
          <div class="hstat-label">Active Days</div>
        </div>
      </div>
      <div class="heatmap-scroll">
        <div class="heatmap-inner">
          ${monthRowHTML}
          <div class="heatmap-body">
            ${dayLabelsHTML}
            ${gridHTML}
          </div>
        </div>
      </div>
      ${legendHTML}`;
  }

  return { getData, getStreak, renderHeatmap };
})();

window.Calendar = Calendar;

</script>

// ════════════════════════════════════════════════
// 1. Bootstrap
// ════════════════════════════════════════════════
document.addEventListener("DOMContentLoaded", () => {
  applyTheme(Storage.getTheme());
  buildSidebar();
  buildTopSearch();
  navigateTo("dashboard");

  document.getElementById("hamburger")?.addEventListener("click", () => {
    document.getElementById("sidebar").classList.add("open");
    document.getElementById("sidebar-overlay").classList.add("show");
  });
  document.getElementById("sidebar-overlay")?.addEventListener("click", closeMobile);
});

function closeMobile() {
  document.getElementById("sidebar").classList.remove("open");
  document.getElementById("sidebar-overlay").classList.remove("show");
}

// ════════════════════════════════════════════════
// 2. Theme
// ════════════════════════════════════════════════
function applyTheme(t) {
  document.documentElement.setAttribute("data-theme", t);
  Storage.saveTheme(t);
  const btn = document.getElementById("theme-toggle");
  if (btn) btn.innerHTML = t === "dark" ? ICONS.sun : ICONS.moon;
}
window.toggleTheme = () => applyTheme(Storage.getTheme() === "dark" ? "light" : "dark");

// ════════════════════════════════════════════════
// 3. Sidebar & Navigation
// ════════════════════════════════════════════════
function buildSidebar() {
  const items = [
    { id:"dashboard", label:"Dashboard",          icon:ICONS.dashboard },
    { id:"questions", label:"DSA Questions",       icon:ICONS.code },
    { id:"patterns",  label:"Patterns",            icon:ICONS.map },
    { id:"notes",     label:"Revision Notes",      icon:ICONS.note },
    { id:"articles",  label:"Articles",            icon:ICONS.book },
    { id:"videos",    label:"Practice Videos",     icon:ICONS.play },
    { id:"timer",     label:"Study Timer",         icon:ICONS.timer },
    { id:"progress",  label:"Progress Tracker",    icon:ICONS.chart },
    { id:"calendar",  label:"Submission Calendar", icon:ICONS.calendar },
    { id:"settings",  label:"Settings",            icon:ICONS.settings },
  ];
  const nav = document.getElementById("nav-items");
  if (!nav) return;
  nav.innerHTML = items.map(it => `
    <button class="nav-item" id="nav-${it.id}" onclick="navigateTo('${it.id}')">
      <span class="nav-icon">${it.icon}</span>${it.label}
    </button>`).join("");
  updateSidebarProg();
}

function updateSidebarProg() {
  const solved = Object.keys(Storage.getSolved()).length;
  const total  = QUESTIONS_DB.length;
  const pct    = Math.round((solved/total)*100);
  const fill   = document.getElementById("sidebar-prog-fill");
  const label  = document.getElementById("sidebar-prog-label");
  if (fill)  fill.style.width  = pct + "%";
  if (label) label.textContent = `${solved} / ${total}`;
}

window.navigateTo = function(id) {
  state.section = id;
  document.querySelectorAll(".nav-item").forEach(el => el.classList.remove("active"));
  document.querySelectorAll(".section").forEach(el => el.classList.remove("active"));
  document.getElementById("nav-"+id)?.classList.add("active");

  const existing = document.getElementById("sec-"+id);
  if (existing) { existing.classList.add("active"); }
  else          { renderSection(id); }

  const labels = { dashboard:"Dashboard", questions:"DSA Questions", patterns:"Patterns",
    notes:"Revision Notes", articles:"Articles", videos:"Practice Videos",
    timer:"Study Timer", progress:"Progress Tracker", calendar:"Submission Calendar", settings:"Settings" };
  document.getElementById("topbar-title").textContent = labels[id] || id;
  closeMobile();
  window.scrollTo(0,0);
};

function renderSection(id) {
  const main = document.getElementById("content-sections");
  const el   = document.createElement("div");
  el.id      = "sec-"+id;
  el.className = "section active";

  const builders = {
    dashboard: buildDashboard, questions: buildQuestionsShell,
    patterns:  buildPatternsPage, notes: buildNotesShell,
    articles:  buildArticlesShell, videos: buildVideosShell,
    timer:     buildTimerShell, progress: buildProgressShell,
    calendar:  buildCalendarShell, settings: buildSettings,
  };
  el.innerHTML = (builders[id] || (() => "<p>Not found</p>"))();
  main.appendChild(el);

  requestAnimationFrame(() => {
    const inits = { questions:initQuestions, notes:initNotes, articles:initArticles,
      videos:initVideos, timer:initTimer, progress:initProgress, calendar:initCalendar };
    inits[id]?.();
  });
}

// ════════════════════════════════════════════════
// 4. Topbar search
// ════════════════════════════════════════════════
function buildTopSearch() {
  document.getElementById("topbar-search-input")?.addEventListener("input", e => {
    state.q_search = e.target.value.trim();
    state.q_page   = 1;
    if (state.section !== "questions") navigateTo("questions");
    else setTimeout(renderQuestionTable, 0);
  });
}

function buildDashboard() {
  const solved    = Storage.getSolved();
  const total     = QUESTIONS_DB.length;
  const sc        = Object.keys(solved).length;
  const solvedSet = new Set(Object.keys(solved).map(Number));
  const easy      = QUESTIONS_DB.filter(q=>q.difficulty==="Easy");
  const med       = QUESTIONS_DB.filter(q=>q.difficulty==="Medium");
  const hard      = QUESTIONS_DB.filter(q=>q.difficulty==="Hard");
  const eS=easy.filter(q=>solvedSet.has(q.id)).length;
  const mS=med.filter(q=>solvedSet.has(q.id)).length;
  const hS=hard.filter(q=>solvedSet.has(q.id)).length;
  const pct = Math.round((sc/total)*100);
  const { streak } = Calendar.getStreak();

  const QUOTES = [
    {q:"The only way to do great work is to love what you do.",a:"Steve Jobs"},
    {q:"It does not matter how slowly you go, as long as you do not stop.",a:"Confucius"},
    {q:"Don't stop when you're tired. Stop when you're done.",a:"Unknown"},
    {q:"Consistency is the key to mastery.",a:"Unknown"},
    {q:"Every expert was once a beginner.",a:"Unknown"},
    {q:"Hard work beats talent when talent doesn't work hard.",a:"Tim Notke"},
  ];
  const qt = QUOTES[new Date().getDate() % QUOTES.length];

  const recentHTML = Object.entries(solved)
    .sort((a,b)=>b[1]-a[1]).slice(0,5)
    .map(([id,ts]) => {
      const q = QUESTIONS_DB.find(q=>q.id===+id);
      if (!q) return "";
      return `<div class="recent-item">
        <span class="badge badge-${q.difficulty.toLowerCase()}">${q.difficulty[0]}</span>
        <span class="ri-title">${q.title}</span>
        <span class="ri-date">${relTime(ts)}</span>
        <a href="${q.url}" target="_blank" class="btn btn-xs">${ICONS.link}</a>
      </div>`;
    }).join("") || `<div class="empty" style="padding:20px"><p>No questions solved yet — start now!</p></div>`;

  const favIDs = Object.keys(Storage.getFavorites()).map(Number);
  const favHTML = favIDs.slice(-4).reverse().map(id => {
    const q = QUESTIONS_DB.find(q=>q.id===id);
    if (!q) return "";
    return `<div class="recent-item">
      <span style="color:var(--yellow)">${ICONS.starfill}</span>
      <span class="ri-title">${q.title}</span>
      <span class="badge badge-${q.difficulty.toLowerCase()}">${q.difficulty}</span>
      <a href="${q.url}" target="_blank" class="btn btn-xs">${ICONS.link}</a>
    </div>`;
  }).join("") || `<div style="font-size:12px;color:var(--text-3);padding:12px 0">Star questions to see them here.</div>`;

  const daily = loadDailyChallenge();
  const dailySolved = daily ? Storage.isSolved(daily.id) : false;
  const dailyHTML = daily ? `
  <div class="daily-card">
    <div class="daily-badge">${ICONS.lightning} DAILY</div>
    <div class="daily-info">
      <div class="daily-title">${daily.title}</div>
      <div class="daily-meta">
        <span class="badge badge-${daily.difficulty.toLowerCase()}">${daily.difficulty}</span>
        <span class="badge badge-blue">${daily.pattern}</span>
        <span style="font-size:11px;color:var(--text-3)">${daily.platform}</span>
      </div>
    </div>
    <div class="daily-actions">
      <a href="${daily.url}" target="_blank" class="btn btn-yellow btn-sm">${ICONS.link} Solve</a>
      <button onclick="toggleSolvedById(${daily.id},this)" class="btn btn-sm ${dailySolved?'btn-green':''}">
        ${dailySolved ? ICONS.check+' Done' : ICONS.circle+' Mark Done'}
      </button>
    </div>
  </div>` : "";

  return `
  <div class="quote-banner">
    <div class="quote-text">"${qt.q}"</div>
    <div class="quote-author">— ${qt.a}</div>
  </div>
  ${dailyHTML}
  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-card-accent" style="background:var(--yellow)"></div>
      <div class="stat-icon">${ICONS.zap}</div>
      <div class="stat-val" style="color:var(--yellow)">${sc}</div>
      <div class="stat-label">Total Solved</div>
      <div class="stat-sub">${pct}% of all questions</div>
    </div>
    <div class="stat-card">
      <div class="stat-card-accent" style="background:var(--green)"></div>
      <div class="stat-icon">${ICONS.check}</div>
      <div class="stat-val" style="color:var(--green)">${eS}/${easy.length}</div>
      <div class="stat-label">Easy Solved</div>
      <div class="stat-sub">${Math.round((eS/easy.length)*100)||0}%</div>
    </div>
    <div class="stat-card">
      <div class="stat-card-accent" style="background:var(--orange)"></div>
      <div class="stat-icon">${ICONS.target}</div>
      <div class="stat-val" style="color:var(--orange)">${mS}/${med.length}</div>
      <div class="stat-label">Medium Solved</div>
      <div class="stat-sub">${Math.round((mS/med.length)*100)||0}%</div>
    </div>
    <div class="stat-card">
      <div class="stat-card-accent" style="background:var(--red)"></div>
      <div class="stat-icon">${ICONS.award}</div>
      <div class="stat-val" style="color:var(--red)">${hS}/${hard.length}</div>
      <div class="stat-label">Hard Solved</div>
      <div class="stat-sub">${Math.round((hS/hard.length)*100)||0}%</div>
    </div>
    <div class="stat-card">
      <div class="stat-card-accent" style="background:var(--purple)"></div>
      <div class="stat-icon">${ICONS.flame}</div>
      <div class="stat-val" style="color:var(--purple)">${streak}</div>
      <div class="stat-label">Day Streak</div>
      <div class="stat-sub">Keep going!</div>
    </div>
    <div class="stat-card">
      <div class="stat-card-accent" style="background:var(--teal)"></div>
      <div class="stat-icon">${ICONS.trending}</div>
      <div class="stat-val" style="color:var(--teal)">${total-sc}</div>
      <div class="stat-label">Remaining</div>
      <div class="stat-sub">Questions left</div>
    </div>
  </div>

  <div class="overall-prog">
    <div class="overall-prog-header">
      <span class="overall-prog-label">${ICONS.trending} Overall Progress</span>
      <span class="overall-prog-val">${sc} / ${total} &nbsp;·&nbsp; ${pct}%</span>
    </div>
    <div class="prog-bar-thick">
      <div class="prog-bar-fill" style="width:${pct}%"></div>
    </div>
  </div>

  <div class="dash-2col">
    <div>
      <div class="sec-card" style="margin-bottom:16px">
        <div class="sec-card-title">${ICONS.clock} Recently Solved</div>
        ${recentHTML}
      </div>
      <div class="sec-card">
        <div class="sec-card-title">${ICONS.starfill} Favorites</div>

        <button onclick="navigateTo('questions')" class="btn btn-sm" style="margin-top:10px;width:100%">

    <div class="sec-card">
      <div class="sec-card-title">${ICONS.lightning} Quick Actions</div>
      <button onclick="openRandom()" class="quick-btn">${ICONS.shuffle}<span>Random Question</span></button>
      <button onclick="navigateTo('timer')" class="quick-btn">${ICONS.timer}<span>Start Study Session</span></button>
      <button onclick="navigateTo('progress')" class="quick-btn">${ICONS.chart}<span>View Progress Charts</span></button>
      <button onclick="navigateTo('calendar')" class="quick-btn">${ICONS.calendar}<span>Submission Calendar</span></button>
      <button onclick="navigateTo('notes')" class="quick-btn">${ICONS.note}<span>Open Notes</span></button>
      <button onclick="navigateTo('videos')" class="quick-btn">${ICONS.play}<span>Watch Solutions</span></button>
    </div>
  </div>`;
}

function loadDailyChallenge() {
  const daily = Storage.getDaily();
  const today = new Date().toISOString().slice(0,10);
  if (daily.date === today) return QUESTIONS_DB.find(q=>q.id===daily.id);
  const doy = Math.floor((Date.now() - new Date(new Date().getFullYear(),0,0)) / 86400000);
  const q   = QUESTIONS_DB[doy % QUESTIONS_DB.length];
  Storage.saveDaily({ date:today, id:q.id });
  return q;
}
window.openRandom = () => window.open(QUESTIONS_DB[Math.floor(Math.random()*QUESTIONS_DB.length)].url,"_blank");

function initQuestions() { renderQuestionTable(); }
window.toggleDiff   = (d,b) => { const i=state.q_difficulty.indexOf(d); i===-1?state.q_difficulty.push(d):state.q_difficulty.splice(i,1); b.classList.toggle("active"); state.q_page=1; renderQuestionTable(); };
window.filterPattern= v => { state.q_pattern=v; state.q_page=1; renderQuestionTable(); };
window.filterCompany= v => { state.q_company=v; state.q_page=1; renderQuestionTable(); };
window.filterStatus = v => { state.q_status=v;  state.q_page=1; renderQuestionTable(); };
window.qSearch      = v => { state.q_search=v;  state.q_page=1; renderQuestionTable(); };

function getFiltered() {
  const s=Storage.getSolved(), f=Storage.getFavorites(), b=Storage.getBookmarks();
  let list=QUESTIONS_DB.slice();
  if(state.q_difficulty.length) list=list.filter(q=>state.q_difficulty.includes(q.difficulty));
  if(state.q_pattern!=="All")   list=list.filter(q=>q.pattern===state.q_pattern);
  if(state.q_company!=="All")   list=list.filter(q=>q.company.includes(state.q_company));
  if(state.q_status==="Solved")    list=list.filter(q=>s[q.id]);
  if(state.q_status==="Unsolved")  list=list.filter(q=>!s[q.id]);
  if(state.q_status==="Favorite")  list=list.filter(q=>f[q.id]);
  if(state.q_status==="Bookmark")  list=list.filter(q=>b[q.id]);
  if(state.q_search) {
    const lq=state.q_search.toLowerCase();
    list=list.filter(q=>q.title.toLowerCase().includes(lq)||q.pattern.toLowerCase().includes(lq)||q.difficulty.toLowerCase().includes(lq)||q.company.some(c=>c.toLowerCase().includes(lq)));
  }
  return list;
}

function renderQuestionTable() {
  const wrap=document.getElementById("q-table-wrap");
  const pgEl=document.getElementById("q-pagination");
  const cntEl=document.getElementById("q-count");
  if(!wrap) return;

  const all=getFiltered(), total=all.length;
  const pages=Math.ceil(total/PER_PAGE)||1;
  state.q_page=Math.min(state.q_page,pages);
  const slice=all.slice((state.q_page-1)*PER_PAGE, state.q_page*PER_PAGE);

  if(cntEl) cntEl.textContent=`${total} questions`;

  if(!slice.length) {
    wrap.innerHTML=`<div class="empty">${ICONS.search}<p>No questions match your filters.</p></div>`;
    if(pgEl) pgEl.innerHTML=""; return;
  }

  const rows=slice.map(q=>{
    const isSol=Storage.isSolved(q.id);
    const isFav=Storage.isFavorite(q.id);
    const isBkm=Storage.isBookmarked(q.id);
    const cos=q.company.slice(0,3).map(c=>`<span class="co-tag">${c}</span>`).join("")+(q.company.length>3?`<span class="co-tag">+${q.company.length-3}</span>`:"");
    const ytUrl=`https://www.youtube.com/results?search_query=${encodeURIComponent(q.title+" "+q.platform+" solution")}`;
    return `<tr class="${isSol?'solved':''}">
      <td><span class="q-title-link" onclick="window.open('${q.url}','_blank')">${q.title}</span></td>
      <td><span class="badge badge-${q.difficulty.toLowerCase()}">${q.difficulty}</span></td>
      <td><span class="pattern-tag">${q.pattern}</span></td>
      <td><div class="company-tags">${cos}</div></td>
      <td><span class="plat-badge">${q.platform}</span></td>
      <td>
        <div class="q-actions">
          <button class="q-action-btn ${isSol?'is-solved':''}" title="${isSol?'Unsolved':'Mark Solved'}" onclick="toggleSolvedById(${q.id},this)">${isSol?ICONS.check:ICONS.circle}</button>
          <button class="q-action-btn ${isFav?'is-fav':''}" title="${isFav?'Remove Favorite':'Favorite'}" onclick="toggleFavById(${q.id},this)">${isFav?ICONS.starfill:ICONS.star}</button>
          <button class="q-action-btn ${isBkm?'is-bookmarked':''}" title="${isBkm?'Remove Bookmark':'Bookmark'}" onclick="toggleBkmById(${q.id},this)">${isBkm?ICONS.bookmarkfill:ICONS.bookmark}</button>
          <a href="${ytUrl}" target="_blank" class="q-action-btn" title="Watch Solution">${ICONS.yt}</a>
        </div>
      </td>
    </tr>`;
  }).join("");

  wrap.innerHTML=`<div class="q-table-wrap"><table class="q-table">
    <thead><tr><th>Title</th><th>Difficulty</th><th>Pattern</th><th>Companies</th><th>Platform</th><th>Actions</th></tr></thead>
    <tbody>${rows}</tbody>
  </table></div>`;

  if(pages>1) {
    const p=state.q_page;
    let h=`<div class="pagination">`;
    h+=`<button class="pg-btn" onclick="goPage(${p-1})" ${p===1?'disabled':''}>‹</button>`;
    const s2=Math.max(1,p-2), e2=Math.min(pages,s2+4);
    if(s2>1) h+=`<button class="pg-btn" onclick="goPage(1)">1</button>${s2>2?'<span style="color:var(--text-3);padding:0 4px">…</span>':""}`;
    for(let i=s2;i<=e2;i++) h+=`<button class="pg-btn ${i===p?'active':''}" onclick="goPage(${i})">${i}</button>`;
    if(e2<pages) h+=`${e2<pages-1?'<span style="color:var(--text-3);padding:0 4px">…</span>':""}<button class="pg-btn" onclick="goPage(${pages})">${pages}</button>`;
    h+=`<button class="pg-btn" onclick="goPage(${p+1})" ${p===pages?'disabled':''}>›</button>`;
    h+=`<span class="pg-info">Page ${p} of ${pages} · ${total} questions</span></div>`;
    pgEl.innerHTML=h;
  } else { if(pgEl) pgEl.innerHTML=""; }

  updateSidebarProg();
}

window.goPage=p=>{const all=getFiltered(),pages=Math.ceil(all.length/PER_PAGE);if(p<1||p>pages)return;state.q_page=p;renderQuestionTable();document.getElementById("q-table-wrap")?.scrollIntoView({behavior:"smooth"});};

window.toggleSolvedById=function(id,btn){
  const now=Storage.toggleSolved(id);
  if(!btn){renderQuestionTable();return;}
  const row=btn.closest("tr");
  if(now){btn.classList.add("is-solved");btn.innerHTML=ICONS.check;row?.classList.add("solved");toast("Marked as solved!","success");}
  else{btn.classList.remove("is-solved");btn.innerHTML=ICONS.circle;row?.classList.remove("solved");toast("Marked as unsolved","info");}
  updateSidebarProg();
};
window.toggleFavById=function(id,btn){const now=Storage.toggleFavorite(id);btn.classList.toggle("is-fav",now);btn.innerHTML=now?ICONS.starfill:ICONS.star;toast(now?"Added to favorites":"Removed from favorites","info");};
window.toggleBkmById=function(id,btn){const now=Storage.toggleBookmark(id);btn.classList.toggle("is-bookmarked",now);btn.innerHTML=now?ICONS.bookmarkfill:ICONS.bookmark;toast(now?"Bookmarked":"Bookmark removed","info");};

function buildPatternsPage() {
  const solved=Storage.getSolved();
  const cards=PATTERNS.map(p=>{
    const qs=QUESTIONS_DB.filter(q=>q.pattern===p);
    if(!qs.length) return "";
    const solCnt=qs.filter(q=>solved[q.id]).length;
    const pct=Math.round((solCnt/qs.length)*100);
    const pills=qs.slice(0,8).map(q=>`<a href="${q.url}" target="_blank" class="pattern-pill ${solved[q.id]?'solved':''}" title="${q.difficulty}">${q.title.length>22?q.title.slice(0,22)+"…":q.title}</a>`).join("")+(qs.length>8?`<span class="pattern-pill">+${qs.length-8} more</span>`:"");
    return `<div class="pattern-card">
      <div class="pattern-card-header">
        <div class="pattern-card-name">${ICONS.codesm} ${p}</div>
        <div class="pattern-card-count">${solCnt}/${qs.length}</div>
      </div>
      <div class="pattern-prog-track"><div class="pattern-prog-fill" style="width:${pct}%"></div></div>
      <div class="pattern-pills">${pills}</div>
      <button onclick="filterByPattern('${p}')" class="btn btn-sm" style="width:100%;justify-content:center">${ICONS.code} View All Questions</button>
    </div>`;
  }).join("");
  return `<div class="sec-header"><div><h2>Question Patterns</h2><p>25 patterns · organized by algorithm technique</p></div></div>
  <div class="patterns-grid">${cards}</div>`;
}

window.filterByPattern=function(p){state.q_pattern=p;navigateTo("questions");setTimeout(()=>{const el=document.getElementById("filter-pattern");if(el)el.value=p;renderQuestionTable();},100);};

window.notesCat=function(c,btn){state.note_cat=c;document.querySelectorAll(".cat-btn").forEach(b=>b.classList.remove("active"));btn.classList.add("active");renderNotesList();};
function renderNotesList(){
  const el=document.getElementById("notes-list");if(!el)return;
  const q=document.getElementById("note-search")?.value||"";
  let notes=state.note_cat==="All"?Notes.getAll():Notes.byCategory(state.note_cat);
  if(q)notes=notes.filter(n=>n.title.toLowerCase().includes(q.toLowerCase())||n.content.toLowerCase().includes(q.toLowerCase()));
  if(!notes.length){el.innerHTML=`<div class="empty">${ICONS.note}<p>No notes yet. Hit "New Note" to start!</p></div>`;return;}
  el.innerHTML=notes.map(n=>`<div class="note-card ${n.id===state.note_id?'selected':''}" onclick="editNote(${n.id})">

window.openNewNote=function(){state.note_id=null;renderNoteEditor(null);};
window.editNote=function(id){state.note_id=id;const n=Notes.getAll().find(n=>n.id===id);renderNotesList();renderNoteEditor(n);};
function renderNoteEditor(note){
  const el=document.getElementById("note-editor-wrap");if(!el)return;
  const catOpts=Notes.CATS.map(c=>`<option ${note?.category===c?"selected":""}>${c}</option>`).join("");
  el.innerHTML=`<div class="sec-card note-editor-area" style="margin-top:14px">
    <input type="text" class="nb-input" id="ne-title" placeholder="Note title…" value="${escHTML(note?.title||"")}">
    <select class="nb-input" id="ne-cat" style="cursor:pointer">${catOpts}</select>
    <textarea class="nb-input" id="ne-content" placeholder="Write your notes here…">${escHTML(note?.content||"")}</textarea>
    <div style="display:flex;gap:8px">
      <button onclick="saveNote()" class="btn btn-yellow">${ICONS.save} Save</button>
      ${note?`<button onclick="deleteNote(${note.id})" class="btn btn-red">${ICONS.trash} Delete</button>`:""}
      <button onclick="closeNoteEditor()" class="btn">${ICONS.close} Cancel</button>
    </div>
  </div>`;
}
window.saveNote=function(){
  const t=document.getElementById("ne-title")?.value.trim();
  const c=document.getElementById("ne-content")?.value;
  const cat=document.getElementById("ne-cat")?.value;
  if(!t){toast("Please add a title","error");return;}
  if(state.note_id) Notes.update(state.note_id,{title:t,content:c,category:cat});
  else {const n=Notes.create(t,c,cat);state.note_id=n.id;}
  renderNotesList();toast("Note saved!","success");
};
window.deleteNote=function(id){if(!confirm("Delete this note?"))return;Notes.remove(id);state.note_id=null;document.getElementById("note-editor-wrap").innerHTML="";renderNotesList();toast("Note deleted","info");};
window.closeNoteEditor=function(){document.getElementById("note-editor-wrap").innerHTML="";state.note_id=null;};

function initTimer(){state.timer_mode="stopwatch";Timer.setMode("stopwatch");}
window.setTimerMode=function(m,btn){
  document.querySelectorAll(".tmode-btn").forEach(b=>b.classList.remove("active"));btn.classList.add("active");
  state.timer_mode=m;Timer.reset();
  document.getElementById("timer-display").textContent="00:00";
  document.getElementById("pomo-info").style.display=m==="pomodoro"?"block":"none";
  document.getElementById("custom-inputs").style.display=m==="custom"?"block":"none";
  document.getElementById("timer-phase").textContent="";
  document.getElementById("timer-cycles").textContent="";
};
window.timerStart=function(){
  const disp=document.getElementById("timer-display");
  const phase=document.getElementById("timer-phase");
  const opts={mode:state.timer_mode,
    onTick:(display)=>{if(disp)disp.textContent=display;},
    onDone:(mode,pomPhase)=>{
      toast(pomPhase==="work"?"Work session done! Take a break 🎉":"Break over! Back to work 💪","success");
      if(phase)phase.textContent=pomPhase==="work"?"☕ Break Time":"🍅 Work Session";
    }};
  if(state.timer_mode==="custom"){const h=+(document.getElementById("t-h")?.value||0),m=+(document.getElementById("t-m")?.value||0),s=+(document.getElementById("t-s")?.value||0);opts.totalSeconds=h*3600+m*60+s;}
  if(state.timer_mode==="pomodoro"&&phase)phase.textContent="🍅 Work Session";
  Timer.start(opts);
};
window.timerPause=function(){const st=Timer.getState();if(st.isRunning){Timer.pause();toast("Timer paused","info");}else{timerStart();}};
window.timerReset=function(){Timer.reset();const d=document.getElementById("timer-display");const p=document.getElementById("timer-phase");if(d)d.textContent="00:00";if(p)p.textContent="";toast("Timer reset","info");};

  const solved=Storage.getSolved();
  const diffs=["Easy","Medium","Hard"];
  const cols={Easy:"var(--green)",Medium:"var(--orange)",Hard:"var(--red)"};
  const bars=diffs.map(d=>{
    const total=QUESTIONS_DB.filter(q=>q.difficulty===d).length;
    const sol=QUESTIONS_DB.filter(q=>q.difficulty===d&&solved[q.id]).length;
    const pct=total?Math.round((sol/total)*100):0;
    return `<div class="bar-item">
      <div class="bar-row"><span>${d}</span><span>${sol}/${total} (${pct}%)</span></div>
      <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${cols[d]}"></div></div>
    </div>`;
  }).join("");
  el.innerHTML=`<div class="chart-head">${ICONS.chart} Difficulty Progress</div><div>${bars}</div>`;
}
function renderPatternChart(){
  const el=document.getElementById("chart-pattern");if(!el)return;
  const solved=Storage.getSolved();
  const bars=PATTERNS.map(p=>{
    const total=QUESTIONS_DB.filter(q=>q.pattern===p).length;
    if(!total)return "";
    const sol=QUESTIONS_DB.filter(q=>q.pattern===p&&solved[q.id]).length;
    const pct=Math.round((sol/total)*100);
    return `<div class="bar-item">
      <div class="bar-row"><span>${p}</span><span>${sol}/${total}</span></div>
      <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:linear-gradient(90deg,var(--yellow),var(--orange))"></div></div>
    </div>`;
  }).join("");
  el.innerHTML=`<div class="chart-head">${ICONS.map} Pattern Progress</div><div>${bars}</div>`;
}

    </div>
    <div class="settings-card">
      <h3>${ICONS.export} Data</h3>
      <div class="settings-row">
        <div><label>Export backup</label><p>Download all your data as JSON</p></div>
        <button onclick="exportData()" class="btn btn-sm">${ICONS.export} Export</button>
      </div>
      <div class="settings-row">
        <div><label>Import backup</label><p>Restore from a JSON file</p></div>
        <button onclick="document.getElementById('import-file').click()" class="btn btn-sm">${ICONS.import} Import</button>
        <input type="file" id="import-file" accept=".json" style="display:none" onchange="importData(event)">
      </div>
      <div class="settings-row">
        <div><label>Reset all data</label><p style="color:var(--red)">Cannot be undone!</p></div>
        <button onclick="resetData()" class="btn btn-red btn-sm">${ICONS.reset} Reset</button>
      </div>
    </div>
    <div class="settings-card">
      <h3>${ICONS.chart} Stats</h3>
      <div class="settings-row"><label>Total Questions</label><span class="mono">${QUESTIONS_DB.length}</span></div>
      <div class="settings-row"><label>Solved</label><span class="mono" style="color:var(--green)">${Object.keys(Storage.getSolved()).length}</span></div>
      <div class="settings-row"><label>Favorites</label><span class="mono" style="color:var(--yellow)">${Object.keys(Storage.getFavorites()).length}</span></div>
      <div class="settings-row"><label>Bookmarks</label><span class="mono" style="color:var(--blue)">${Object.keys(Storage.getBookmarks()).length}</span></div>
      <div class="settings-row"><label>Notes</label><span class="mono">${Notes.getAll().length}</span></div>
    </div>
    <div class="settings-card">
      <h3>${ICONS.info} About</h3>
      <div class="settings-row"><label>Version</label><span class="mono">2.0.0</span></div>
      <div class="settings-row"><label>Questions</label><span class="mono">${QUESTIONS_DB.length}+</span></div>
      <div class="settings-row"><label>Patterns</label><span class="mono">${PATTERNS.length}</span></div>

        DSA Prep Dashboard — your complete interview prep toolkit. No backend, no ads, just pure focus.
      </div>

}
window.exportData=function(){const data=Storage.exportData();const blob=new Blob([data],{type:"application/json"});const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="dsa-prep-"+new Date().toISOString().slice(0,10)+".json";a.click();toast("Data exported!","success");};
window.importData=function(e){const file=e.target.files[0];if(!file)return;const reader=new FileReader();reader.onload=ev=>{const ok=Storage.importData(ev.target.result);if(ok){toast("Data imported!","success");setTimeout(()=>location.reload(),1500);}else toast("Import failed – invalid file","error");};reader.readAsText(file);};
window.resetData=function(){if(!confirm("⚠️ Erase ALL data? This cannot be undone."))return;Storage.resetAll();toast("All data reset","info");setTimeout(()=>location.reload(),1000);};

// 15. Helpers
// ════════════════════════════════════════════════
function escHTML(s=""){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
function relTime(ts){const d=Date.now()-ts,m=Math.floor(d/60000),h=Math.floor(d/3600000),day=Math.floor(d/86400000);if(day>0)return day+"d ago";if(h>0)return h+"h ago";if(m>0)return m+"m ago";return "just now";}

function toast(msg,type="info"){
  const c=document.getElementById("toast-container");if(!c)return;
  const t=document.createElement("div");t.className="toast "+type;
  const ico={success:ICONS.ok,error:ICONS.err,info:ICONS.info};
  t.innerHTML=`${ico[type]||""}<span>${msg}</span>`;
  c.appendChild(t);
  setTimeout(()=>{t.style.animation="slideOut .2s ease forwards";setTimeout(()=>t.remove(),250);},2800);
}
window.toast=toast;

})();
